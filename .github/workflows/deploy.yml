name: Deploy Angular Frontend Coservanguard
on:
  push:
    branches: [ "main" ] # Assumed branch is 'main', change if it is 'master'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22' # Puedes cambiarlo a 20 si usas una versión más reciente

    - name: Instalar dependencias (npm install)
      run: npm install --legacy-peer-deps

    - name: Compilar Angular para producción (ng build)
      run: npm run build -- --configuration production

    - name: DEBUG - Ver estructura exacta de carpetas generadas
      run: ls -R dist/

    - name: Preparar archivos (Bypass SCP bug)
      run: |
        mkdir -p folder_to_deploy
        cp -r dist/coservanguard_web/browser/* folder_to_deploy/

    - name: Copiar archivos al servidor web Nginx en Azure
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        source: "folder_to_deploy"
        target: "/var/www/html/"
        strip_components: 1
