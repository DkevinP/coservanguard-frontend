<div class="map-view-container">

  <mat-card class="filter-panel">
    <mat-card-header>
      <mat-icon mat-card-avatar class="header-icon action-blue">place</mat-icon>
      <mat-card-title>Mapa de Puntos QR</mat-card-title>
      <mat-card-subtitle>Filtrar ubicaciones geográficas</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="filterForm" class="filter-form">

      <mat-form-field appearance="outline" class="full-width">
          <mat-label>Seleccionar Cliente</mat-label>
          <mat-select formControlName="idCliente">
            <mat-option [value]="null">-- Seleccionar Cliente --</mat-option>
            <mat-option *ngFor="let cliente of clientes" [value]="cliente.id">
              {{cliente.nombre}}
            </mat-option> </mat-select>
      </mat-form-field>

        <mat-form-field appearance="outline" class="full-width" [ngClass]="{'disabled': !sedesFiltradas.length}">
          <mat-label>Seleccionar Sede</mat-label>
          <mat-select formControlName="idSede" [disabled]="!sedesFiltradas.length">
            <mat-option [value]="null">
              {{sedesFiltradas.length ? '-- Seleccionar Sede --' : 'Seleccione primero un Cliente'}}
            </mat-option>
            <mat-option *ngFor="let sede of sedesFiltradas" [value]="sede.id">
              {{sede.sede}}
            </mat-option>
          </mat-select>
        </mat-form-field>

      </form>
    </mat-card-content>
  </mat-card>

  <div class="map-section">
    <div id="map-container"></div> <div *ngIf="isLoadingMap" class="map-loading-overlay">
      <mat-spinner diameter="50" color="accent"></mat-spinner>
      <p>Cargando puntos de control...</p>
    </div>
  </div>

</div>
